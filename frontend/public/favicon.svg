<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b5a" />
      <stop offset="100%" stop-color="#ff5c39" />
    </linearGradient>
  </defs>
  <style>
    .bg {
      fill: url(#coralGrad);
      stroke: none;
      transition: all 0.3s ease;
    }
    .letter {
      fill: #ffffff;
      transition: all 0.3s ease;
    }
    .dot {
      fill: #ffffff;
      transition: all 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      .bg {
        fill: #14171d;
        stroke: #ff5c39;
        stroke-width: 1.5px;
      }
      .letter {
        fill: #ff5c39;
      }
      .dot {
        fill: #ff5c39;
      }
    }
  </style>
  <circle class="bg" cx="16" cy="16" r="15" />
  <text class="letter" x="15.5" y="22.5" font-family="'Outfit', 'Inter', sans-serif" font-size="19" font-weight="800" text-anchor="middle">A</text>
  <circle class="dot" cx="23" cy="23" r="2.5" />
</svg>
