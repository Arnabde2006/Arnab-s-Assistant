<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Arnab's Assistant — your personal college companion</title>
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    
    <!-- SEO Optimization Meta Tags -->
    <meta name="description" content="Arnab's Assistant is a sleek, AI-powered personal college companion to manage your classes, log attendance, track to-dos, schedule exam timetables, view grades, and focus with built-in Pomodoro." />
    <meta name="keywords" content="college app, attendance tracker, study planner, exam timetable, pomodoro focus timer, grade calculator, CGPA tracker, student companion, AI assistant, college planner" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://arnab-s-assistant.vercel.app/" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arnab-s-assistant.vercel.app/" />
    <meta property="og:title" content="Arnab's Assistant — AI College Companion" />
    <meta property="og:description" content="Manage attendance, view exam schedules, calculate CGPA/SGPA, and track focused study sessions with an AI companion." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://arnab-s-assistant.vercel.app/" />
    <meta name="twitter:title" content="Arnab's Assistant — AI College Companion" />
    <meta name="twitter:description" content="Manage attendance, view exam schedules, calculate CGPA/SGPA, and track focused study sessions with an AI companion." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Theme Initialization Script -->
    <script>
      try {
        var theme = localStorage.getItem("theme") || "ink";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    </script>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0e1a;
        color: #e9ecf7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      html[data-theme="parchment"] #initial-loader {
        background: #eef2f8;
        color: #1e2229;
      }
      .il-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 32px;
        text-align: center;
      }
      .il-logo {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        background: linear-gradient(135deg, #3968db 0%, #6366f1 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px rgba(57, 104, 219, 0.35);
        animation: il-pulse 2s infinite ease-in-out;
      }
      html[data-theme="parchment"] .il-logo {
        background: linear-gradient(135deg, #ff5c39 0%, #ff8c39 100%);
        box-shadow: 0 10px 25px rgba(255, 92, 57, 0.3);
      }
      .il-title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      .il-sub {
        font-size: 13px;
        opacity: 0.65;
        margin-top: -8px;
      }
      .il-spinner-track {
        width: 140px;
        height: 4px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 99px;
        overflow: hidden;
        position: relative;
        margin-top: 8px;
      }
      html[data-theme="parchment"] .il-spinner-track {
        background: rgba(0, 0, 0, 0.08);
      }
      .il-spinner-bar {
        position: absolute;
        top: 0;
        left: -50%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, #3968db, #6366f1);
        border-radius: 99px;
        animation: il-slide 1.4s infinite ease-in-out;
      }
      html[data-theme="parchment"] .il-spinner-bar {
        background: linear-gradient(90deg, #ff5c39, #ff8c39);
      }
      @keyframes il-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes il-slide {
        0% { left: -40%; width: 30%; }
        50% { left: 40%; width: 50%; }
        100% { left: 100%; width: 30%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="il-card">
          <div class="il-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
          </div>
          <div class="il-title">Arnab's Assistant</div>
          <div class="il-sub">Personal College Companion</div>
          <div class="il-spinner-track">
            <div class="il-spinner-bar"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
